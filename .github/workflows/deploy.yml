name: .NET Core CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Build Web API Project
      run: dotnet build --configuration Release --no-restore

    # Packages your clean API directly
    - name: Publish Web API Binaries
      run: dotnet publish ./FreshInventory.API/FreshInventory.API.csproj --configuration Release --output ./publish

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'freshinv2ogtjbi2tjcmu-api' # CRITICAL: Change this to match your new App Service name!
        package: ./publish
